openapi: 3.0.0
info:
  version: 1.0.0
  title: Sample API
security:
  - apiKey: []
  - oauth2: []
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://example.com/oauth/authorize
          scopes:
            read: Read access
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
paths:
  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: OK
  /products:
    post:
      summary: Create a new product
      responses:
        '200':
          description: OK
  /orders:
    put:
      summary: Update an order
      responses:
        '200':
          description: OK
  /invoices:
    delete:
      summary: Delete an invoice
      responses:
        '200':
          description: OK
  /items:
    patch:
      summary: Patch an item
      responses:
        '200':
          description: OK
